version: '3.8'
services:
  nginx:
    image: nginx:alpine
    container_name: ktb_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./public_html:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - php
    networks:
      - ktb_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  php:
    build: ./docker/php
    container_name: ktb_php
    volumes:
      - ./public_html:/var/www/html:ro
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=ktb_evaluation
      - DB_USER=ktb_user
      - DB_PASS=${DB_PASS:-ktb_pass_2024}
    depends_on:
      - mysql
    networks:
      - ktb_network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: ktb_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass_2024}
      MYSQL_DATABASE: ktb_evaluation
      MYSQL_USER: ktb_user
      MYSQL_PASSWORD: ${DB_PASS:-ktb_pass_2024}
    ports:
      - "127.0.0.1:3306:3306"
    volumes:
      - ktb_mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    networks:
      - ktb_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 3

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: ktb_phpmyadmin
    ports:
      - "127.0.0.1:8080:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: ktb_user
      PMA_PASSWORD: ${DB_PASS:-ktb_pass_2024}
    depends_on:
      - mysql
    networks:
      - ktb_network
    restart: unless-stopped

networks:
  ktb_network:
    driver: bridge

volumes:
  ktb_mysql_data:
