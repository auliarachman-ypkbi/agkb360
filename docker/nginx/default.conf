server {
    listen 80;
    server_name localhost agkb360.app www.agkb360.app;
    root /var/www/html;
    index index.php index.html;

    # Allow Certbot challenge
    location ~ /.well-known/acme-challenge {
        allow all;
        root /var/www/html;
    }

    # Route /ktb360
    location /ktb360 {
        try_files $uri $uri/ /ktb360/index.php?$query_string;
    }

    # Routing semua request ke index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Block akses ke file sensitif
    location ~ /\. {
        deny all;
    }
}